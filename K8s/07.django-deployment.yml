apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: django-deployment
  name: django-deployment
  namespace: django-prod
spec:
  replicas: 3



  strategy:
    type: RollingUpdate
    
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1



  selector:
    matchLabels:
      app: django-deployment



  template:
    metadata:
      creationTimestamp: null
      labels:
        app: django-deployment

    spec:
      containers:
      - image: alidevopsx/django_app
        imagePullPolicy: Never

        name: django-app

        ports:
        - containerPort: 8000

        env:
          - name: POSTGRES_HOST
            valueFrom:
              configMapKeyRef:
                name: django-config
                key: POSTGRES_HOST

          - name: POSTGRES_DB
            valueFrom:
              configMapKeyRef:
                name: django-config
                key: POSTGRES_DB

          - name: POSTGRES_USER
            valueFrom:
              configMapKeyRef:
                name: django-config
                key: POSTGRES_USER

          - name: POSTGRES_PORT
            valueFrom:
              configMapKeyRef:
                name: django-config
                key: POSTGRES_PORT

          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: django-secret
                key: DB_PASSWORD

          - name: DEBUG
            valueFrom:
              configMapKeyRef:
                name: django-config
                key: DEBUG

