apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: django-deployment
  name: django-deployment
  namespace: django-prod
spec:
  replicas: 3



  strategy:
    type: RollingUpdate
    
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1



  selector:
    matchLabels:
      app: django-deployment



  template:
    metadata:
      creationTimestamp: null
      labels:
        app: django-deployment

    spec:
      containers:
      - image: alidevopsx/django_app
        name: django-app
        ports:
        - containerPort: 8000

        env:
          - name: DB_HOST
            value: postgres-service

          - name: DB_NAME
            valueFrom:
              configMapKeyRef:
                name: django-config
                key: DB_NAME

          - name: DB_USER
            valueFrom:
              configMapKeyRef:
                name: django-config
                key: DB_USER


          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: django-secret
                key: DB_PASSWORD

