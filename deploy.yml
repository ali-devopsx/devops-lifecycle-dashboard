apiVersion: apps/v1  # version of k8s api

kind: Deployment     # we create deployment

metadata:
  name: django-app   # name of deployment

spec:
  replicas: 1        # number of pods

  selector:
    matchLabels:
      app: django    # label to match pods

  template:
    metadata:
      labels:
        app: django  # pod label

    spec:
      containers:
        - name: django-container  # container name

          image: alidevopsx/django_app  # image

          ports:
            - containerPort: 8000  # app port
