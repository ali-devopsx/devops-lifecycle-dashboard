version: "3" # Docker compose version

services: # Start of our services


    nginx: # Nginx service (Web Server)
      image: nginx:latest # Use the latest Nginx image
      container_name: nginx_server # Name of the container
      restart: unless-stopped
      ports:
        - "80:80" # Map computer port 80 to container port 80
        - "443:443" # Map computer port 443 to container port 443
      volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf # Use my config file
        - .:/app # Link my current folder to /app inside docker
        - ./ssl:/etc/nginx/ssl # Link my SSL folder for HTTPS
        - media_volume:/app/media:ro # Show uploaded photos (Read Only)
        - static_volume:/app/static:ro # Show static files like CSS/JS (Read Only)
      depends_on:
        #- web # Start 'web' service before starting nginx
        web:
          condition: service_healthy



    web: # Django service
      build: . # Build the image using the Dockerfile
      container_name: django_app # Name of the container
      restart: unless-stopped
      command: gunicorn cyber_portfolio.wsgi:application --bind 0.0.0.0:8000 --timeout 50 --workers 3 # Run Django
      volumes:
        - .:/app # Link my code to /app inside docker
        - /var/run/docker.sock:/var/run/docker.sock # Let Django control Docker
        - media_volume:/app/media # Save uploaded photos here permanently
        - static_volume:/app/static # Save static files here permanently
      ports:
        - "8000:8000" # Map computer port 8000 to container port 8000


      depends_on:

         db:
          condition: service_healthy # Start 'db' service before starting web

         redis:
          condition: service_healthy



    db: # Database service
      image: postgres:16 # Use Postgres database image
      container_name: postgres_db # Name of the container
      restart: unless-stopped
      env_file:
        - .env

#      environment:
#         POSTGRES_DB: my_db # Name of my database
#         POSTGRES_USER: ali # Database username
#         POSTGRES_PASSWORD: root # Database password
      volumes:
         # FIXED: Correct path for Postgres storage
         - postgres_data:/var/lib/postgresql/data

      healthcheck:
           test: ["CMD-SHELL", "pg_isready -U ali -d my_db"]
           interval: 20s
           timeout: 10s
           retries: 5

    redis:
      image: redis:7-alpine
      container_name: redis
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 20s
        timeout: 5s
        retries: 5


     
    prometheus: # Monitoring service
        image: prom/prometheus:latest # Use Prometheus image
        restart: unless-stopped
        volumes:
         - ./prometheus.yml:/etc/prometheus/prometheus.yml # My monitoring config
        ports:
         - '9090:9090' # Map computer port 9090 to container port 9090




    grafna: # Visualization service
        image: grafana/grafana # Use Grafana image
        restart: unless-stopped
        ports:
         - '3000:3000' # Map computer port 3000 to container port 3000



volumes: # Permanent storage places
    postgres_data: # For database files
    media_volume:  # For uploaded photos
    static_volume: # For CSS/JS files
