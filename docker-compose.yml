version: "3.9"
services:
    nginx:
      image: nginx:latest
      container_name: nginx_server
      ports:
        - "80:80"
        - "443:443"
      volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        - .:/app
        - ./ssl:/etc/nginx/ssl   # 🔥
      depends_on:
        - web

    web:
      build: .
      container_name: django_app
      command: gunicorn cyber_portfolio.wsgi:application --bind 0.0.0.0:8000
      volumes:
        - .:/app
        - /var/run/docker.sock:/var/run/docker.sock # socket betwen django and docker
      ports:
        - "8000:8000"
      depends_on:
        - db
    
    db:
      image: postgres
      container_name: postgres_db
      environment:
         POSTGRES_DB: my_db
         POSTGRES_USER: ali
         POSTGRES_PASSWORD: root
      volumes:
         - postgres_data:/var/lib/postgres_data
volumes:
    postgres_data:
